<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREDICOPPEL</title>
    <link rel="stylesheet" href="estilos.css"/>
</head>
<body onload="calcular()">

    <img src="img/coppel.png" alt="" srcset="" width="200"/>
    <h1> CREDICOPPEL</h1>
    <hr/>
    <hr/>
    <h3>Producto</h3>
    <br/>
    <select id="producto" onchange="calcular()">
    <option value="tele">TV</option>
    <option value="comedor">COMEDOR</option>
    <option value="lavadora">LAVADORA</option>
    <option value="moto">MOTO</option>
    <option value="sala">SALA</option>
  </select>
  <div id="img"></div>
  <div id="precio"> precio: $ 0.00 MXN</div>
  <hr/>
  <br/>
  <h3>Plazo</h3>
  <input type="radio" name="plazo" id="uno" onchange="calcular()" checked/>6 Meses
   (+10%) <br>
  <input type="radio" name="plazo" id="dos" onchange="calcular()"/> 12 Meses
   (+15%) <br>
  <input type="radio" name="plazo" id="tres" onchange="calcular()"/>18 Meses
   (+20%) <br> <br/>
   <h3>Cantidad</h3>
   <input type="number"
    value="1"
     min="1" 
     max="10"
     id="cantidad"
      onchange="calcular()" 
      /> <br/>
      <div id="contado">Precio de contado: $ 0.00 MXM</div>
      <div id="credito">Precio a credito: $0.00 MXM</div>
      <div id="abono">Abono Mensual: $0.00 MXM</div>
      <script src="app.js"></script> 
    </body>
    </html>
